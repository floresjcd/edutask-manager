<div class="card">
  <h3>{{ isEditing ? 'Editar Tarefa' : 'Nova Tarefa' }}</h3>
  <form (ngSubmit)="onSubmit()" #taskForm="ngForm">
    <div class="form-group">
      <label>Título</label>
      <input type="text" name="title" [(ngModel)]="title" required>
    </div>
    
    <div class="form-group">
      <label>Descrição</label>
      <textarea name="description" [(ngModel)]="description"></textarea>
    </div>
    
    <div class="form-group">
      <label>Data</label>
      <input type="date" name="dueDate" [(ngModel)]="dueDate" required>
    </div>
    
    <div class="form-group">
      <label>Categoria</label>
      <select name="categoryId" [(ngModel)]="categoryId" required>
        <option value="">Selecione...</option>
        <option *ngFor="let cat of categories" [value]="cat.id">
          {{ cat.name }}
        </option>
      </select>
    </div>
    
    <div class="form-actions">
      <button type="submit" [disabled]="!taskForm.form.valid" class="btn-primary">
        {{ isEditing ? 'Atualizar' : 'Adicionar' }}
      </button>
      <button *ngIf="isEditing" type="button" (click)="onCancel()" class="btn-cancel">
        Cancelar
      </button>
    </div>
  </form>
</div>
