<div class="auth-container">
  <div class="auth-card">
    <h2>EduTask Manager</h2>
    <p>Acesse sua conta para gerenciar suas tarefas</p>
    
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" [(ngModel)]="email" required placeholder="seu@email.com">
      </div>
      
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" [(ngModel)]="password" required placeholder="Sua senha">
      </div>
      
      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>
      
      <button type="submit" [disabled]="!loginForm.form.valid">Entrar</button>
    </form>
    
    <div class="auth-footer">
      Não tem uma conta? <a routerLink="/register">Cadastre-se</a>
    </div>
  </div>
</div>
